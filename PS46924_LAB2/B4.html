<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B4 - Modal + Tabs</title>
  <link rel="stylesheet" href="../PS46924_LAB1/css/bootstrap.min.css" />
</head>
<body class="bg-light py-4">

  <div class="container">
    <h1>BÀI TẬP ỨNG DỤNG MODAL</h1>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#authModal">
      Mở form Đăng nhập / Đăng ký
    </button>
  </div>

  <div class="modal fade" id="authModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header ">
          <h5 class="w-100 text-center">ĐĂNG NHẬP/ĐĂNG KÝ</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <ul class="nav nav-tabs">
            <li class="nav-item">
              <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#register-pane" type="button">
                Đăng ký
              </button>
            </li>
            <li class="nav-item">
              <button class="nav-link" data-bs-toggle="tab" data-bs-target="#login-pane" type="button">
                Đăng nhập
              </button>
            </li>
          </ul>

          <div class="tab-content border border-top-0 p-3">
            <div class="tab-pane fade show active" id="register-pane">
              <h3 class="h5 fw-bold mb-3">Form Đăng Ký Thông Tin</h3>
              <form>
                <div class="mb-2">
                  <label for="fullName" class="form-label">Họ và Tên</label>
                  <input type="text" class="form-control" id="fullName" placeholder="Nhập họ và tên" />
                </div>

                <div class="mb-2">
                  <label for="registerEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="registerEmail" placeholder="Nhập email" />
                </div>

                <div class="mb-2">
                  <label for="phone" class="form-label">Số Điện Thoại</label>
                  <input type="tel" class="form-control" id="phone" placeholder="Nhập số điện thoại" />
                </div>

                <div class="mb-2">
                  <label for="password" class="form-label">Mật Khẩu</label>
                  <input type="password" class="form-control" id="password" placeholder="Nhập mật khẩu" />
                </div>

                <div class="mb-2">
                  <label for="confirmPassword" class="form-label">Xác Nhận Mật Khẩu</label>
                  <input type="password" class="form-control" id="confirmPassword" placeholder="Xác nhận mật khẩu" />
                </div>

                <div class="mb-2">
                  <span class="form-label d-block">Giới Tính:</span>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="male" checked />
                    <label class="form-check-label" for="male">Nam</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="gender" id="female" />
                    <label class="form-check-label" for="female">Nữ</label>
                  </div>
                </div>

                <div class="mb-2">
                  <label for="language" class="form-label">Ngôn Ngữ</label>
                  <select class="form-select" id="language">
                    <option selected>Tiếng Việt</option>
                    <option>English</option>
                  </select>
                </div>

                <div class="form-check mb-3 mt-2">
                  <input class="form-check-input" type="checkbox" id="agree" />
                  <label class="form-check-label" for="agree">Tôi đồng ý với các điều khoản và điều kiện</label>
                </div>

                <button type="button" class="btn btn-primary btn-sm">Đăng Ký</button>
              </form>
            </div>

            <div class="tab-pane fade" id="login-pane">
              <h3 class="h5 fw-bold mb-3">Form Đăng nhập</h3>
              <form>
                <div class="mb-2">
                  <label for="loginEmail" class="form-label">Email</label>
                  <input type="email" class="form-control" id="loginEmail" placeholder="Nhập email" />
                </div>

                <div class="mb-3">
                  <label for="loginPassword" class="form-label">Mật Khẩu</label>
                  <input type="password" class="form-control" id="loginPassword" placeholder="Nhập mật khẩu" />
                </div>

                <button type="button" class="btn btn-primary btn-sm">Đăng Nhập</button>
              </form>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="../PS46924_LAB1/js/bootstrap.bundle.min.js"></script>
</body>
</html>
