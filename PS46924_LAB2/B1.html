<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bai 1 - Bang Dinh Duong</title>
    <link rel="stylesheet" href="../PS46924_LAB1/css/bootstrap.min.css">
</head>
<body class="bg-light d-flex justify-content-center align-items-center">
    <div class="mx-0 container my-4">
        <div class="border p-3">
        <h2 class="text-danger fw-bold text-center mb-3">Bảng Thành Phần Dinh Dưỡng</h2>

        <table class="table table-bordered table-light mb-0 align-middle text-center">
            <thead>
                <tr class="table-warning text-center">
                    <th scope="col" rowspan="2" class="w-50">Thành Phần</th>
                    <th scope="colgroup" colspan="2">Giá Trị</th>
                </tr>
                <tr class="table-warning text-center">
                    <th scope="col" class="w-25">Khối Lượng</th>
                    <th scope="col" class="w-25">% DV*</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Calories</td>
                    <td>200 kcal</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Chất Béo</td>
                    <td>9 g</td>
                    <td>14%</td>
                </tr>
                <tr>
                    <td>Chất Béo Bão Hòa</td>
                    <td>4 g</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Chất Đạm</td>
                    <td>8 g</td>
                    <td>16%</td>
                </tr>
                <tr>
                    <td>Chất Xơ</td>
                    <td>5 g</td>
                    <td>20%</td>
                </tr>
                <tr>
                    <td>Đường</td>
                    <td>12 g</td>
                    <td>-</td>
                </tr>
                <tr>
                    <td rowspan="2">Vitamin</td>
                    <td>Vitamin C</td>
                    <td>25%</td>
                </tr>
                <tr>
                    <td>Vitamin D</td>
                    <td>10%</td>
                </tr>
            </tbody>
        </table>
        </div>
    </div>

   
</body>
</html>
